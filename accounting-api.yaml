openapi: 3.0.3
info:
  title: Accounting API
  version: v1.0.0
  description: Accounting service contract (allocation)
tags:
  - name: Accounting
paths:
  /api/v1/accounting/allocation:
    post:
      tags: [Accounting]
      operationId: allocate
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AllocationRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AllocationResponse' }
        '400':
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
components:
  schemas:
    AllocationRequest:
      type: object
      required: [requestId, type, budget]
      properties:
        requestId: { type: integer, format: int64 }
        type: { type: string }
        budget: { type: number }
    AllocationResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        requestId: { type: integer, format: int64 }
        allocated: { type: boolean }
    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer, format: int32 }
        message: { type: string }
        timeStamp: { type: string, format: date-time }
