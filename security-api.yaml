openapi: 3.0.3
info:
  title: Security API
  version: v1.0.0
  description: Security service contract (check)
tags:
  - name: Security
paths:
  /api/v1/security/check:
    post:
      tags: [Security]
      operationId: check
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SecurityCheckRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SecurityCheckResponse' }
        '400':
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
components:
  schemas:
    SecurityCheckRequest:
      type: object
      required: [requestId, type, name, surname, cvUuid]
      properties:
        requestId: { type: integer, format: int64 }
        type: { type: string }
        name: { type: string }
        surname: { type: string }
        cvUuid: { type: string, format: uuid }
    SecurityCheckResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        requestId: { type: integer, format: int64 }
        passed: { type: boolean }
    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer, format: int32 }
        message: { type: string }
        timeStamp: { type: string, format: date-time }
